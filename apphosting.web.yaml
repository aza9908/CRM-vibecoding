# Firebase App Hosting overrides for the Next.js frontend backend (lms-web).
# The lms-web backend is created with environment "web", so this file is
# merged over apphosting.yaml. Both backends build from the repo root so the
# npm-workspaces lockfile and packages/shared are available.

runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 4
  concurrency: 80

scripts:
  # next start binds to $PORT provided by Cloud Run.
  runCommand: npm run start:web

env:
  # Selects "npm run build:web" inside the shared apphosting:build script.
  - variable: APPHOSTING_TARGET
    value: web
    availability:
      - BUILD
  # NEXT_PUBLIC_* values are inlined into the client bundle at build time.
  - variable: NEXT_PUBLIC_API_URL
    value: https://lms-ai--lms-ai-a2fd7.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_WS_URL
    value: wss://lms-ai--lms-ai-a2fd7.europe-west4.hosted.app/live
    availability:
      - BUILD
      - RUNTIME
