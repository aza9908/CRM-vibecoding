<style>

            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center font-body text-on-surface px-margin">
<main class="w-full max-w-sm bg-surface-container-lowest border border-slate-200 rounded-xl p-6 flex flex-col gap-6 relative shadow-sm">
<header class="flex flex-col items-center text-center gap-2">
<div class="h-12 w-12 bg-indigo-tint rounded-lg flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary text-3xl">school</span>
</div>
<h1 class="font-h1-mobile text-h1-mobile text-on-surface">Lumen</h1>
<p class="font-ui text-ui text-on-surface-variant">Введите код сессии, чтобы присоединиться</p>
</header>
<form action="#" class="flex flex-col gap-5 w-full" method="POST">
<div class="flex flex-col gap-1.5">
<label class="sr-only" for="session-code">Код сессии</label>
<input autocomplete="off" class="w-full text-center font-code text-code tracking-[0.25em] py-4 rounded-lg border border-slate-200 bg-surface-container-lowest text-on-surface placeholder:text-outline-variant uppercase transition-shadow" id="session-code" maxlength="6" name="session-code" placeholder="000000" required="" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label text-label text-on-surface-variant uppercase" for="student-name">Ваше имя</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-slate-200 bg-surface-container-lowest font-ui text-ui text-on-surface placeholder:text-outline-variant transition-shadow" id="student-name" name="student-name" placeholder="Иван Иванов" required="" type="text"/>
</div>
</div>
<button class="mt-2 w-full bg-primary hover:bg-primary-container text-on-primary font-ui text-ui font-medium py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2" type="submit">
                Войти
                <span aria-hidden="true" class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<footer class="text-center mt-2">
<a class="font-label text-label text-primary hover:text-primary-container transition-colors" href="#">Нужна помощь?</a>
</footer>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const codeInput = document.getElementById('session-code');
            
            codeInput.addEventListener('input', (e) => {
                let value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
                if (value.length > 6) {
                    value = value.slice(0, 6);
                }
                e.target.value = value;
            });
        });
    </script>
</body></html>
