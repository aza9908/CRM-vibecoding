<!DOCTYPE html>

<html lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Вход - Lumen LMS</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                extend: {
                    "colors": {
                        "surface-container-high": "#eae6f4",

                        "on-tertiary": "#ffffff",
                        "tertiary": "#7e3000",
                        "inverse-primary": "#c3c0ff",
                        "outline": "#777587",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "primary-container": "#4f46e5",
                        "secondary": "#5a5f62",
                        "on-tertiary-container": "#ffd2be",
                        "on-primary-container": "#dad7ff",
                        "primary-fixed-dim": "#c3c0ff",
                        "outline-variant": "#c7c4d8",
                        "tertiary-fixed": "#ffdbcc",
                        "inverse-surface": "#302f39",
                        "on-surface-variant": "#464555",
                        "on-tertiary-fixed": "#351000",
                        "slate-900": "#0F172A",
                        "surface-tint": "#4d44e3",
                        "tertiary-fixed-dim": "#ffb695",
                        "warning": "#F59E0B",
                        "primary-fixed": "#e2dfff",
                        "surface-container-highest": "#e4e1ee",
                        "on-background": "#1b1b24",
                        "inverse-on-surface": "#f3effc",
                        "on-primary-fixed": "#0f0069",
                        "surface-variant": "#e4e1ee",
                        "slate-200": "#E2E8F0",
                        "slate-50": "#F8FAFC",
                        "on-secondary-fixed": "#171c1f",
                        "on-secondary-fixed-variant": "#43474b",
                        "secondary-fixed-dim": "#c3c7cb",
                        "background": "#fcf8ff",
                        "success": "#10B981",
                        "surface-container-low": "#f5f2ff",
                        "secondary-container": "#dce0e4",
                        "destructive": "#EF4444",
                        "tertiary-container": "#a44100",
                        "on-primary-fixed-variant": "#3323cc",
                        "on-secondary-container": "#5e6367",
                        "error": "#ba1a1a",
                        "surface": "#fcf8ff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "surface-dim": "#dcd8e5",
                        "indigo-tint": "#F5F7FF"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "max-width": "1200px",
                        "gutter": "24px",
                        "base": "4px",
                        "margin": "24px",
                        "container-max": "1200px"
                    },
                    "fontFamily": {
                        "display": ["Inter"],
                        "h1": ["Inter"],
                        "h2": ["Inter"],

                    "fontSize": {
                        "display": ["30px", { "lineHeight": "38px", "fontWeight": "700" }],

                        "code": ["28px", { "lineHeight": "36px", "letterSpacing": "0.15em", "fontWeight": "700" }]

                }
            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom focus ring without offset as per guidelines */
        .input-focus-ring:focus {
            outline: none;
            box-shadow: 0 0 0 2px #3525cd;
            border-color: #3525cd;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 font-body text-body text-on-surface">
<main class="w-full max-w-[440px]">
<!-- Brand Logo / Title -->
<div class="text-center mb-8">
<h1 class="font-display text-display text-primary flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
                Lumen
            </h1>
<p class="font-ui text-ui text-on-surface-variant mt-2">Учебная платформа</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-slate-200 rounded-[12px] p-8">
<form action="#" class="space-y-6" method="POST">
<!-- Header -->
<div>
<h2 class="font-h1 text-h1 text-slate-900 mb-1">С возвращением</h2>
<p class="font-ui text-ui text-on-surface-variant">Пожалуйста, введите свои данные для входа.</p>
</div>
<!-- Input Fields -->
<div class="space-y-4">
<div>
<label class="block font-label text-label text-slate-900 uppercase mb-1" for="email">Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 material-symbols-outlined text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg font-ui text-ui text-slate-900 placeholder:text-slate-500 input-focus-ring transition-shadow bg-surface-container-lowest" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1">
<label class="block font-label text-label text-slate-900 uppercase" for="password">Пароль</label>
<a class="font-ui text-ui text-primary hover:text-primary-container transition-colors" href="#">Забыли пароль?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500 material-symbols-outlined text-[20px]">lock</span>
<input class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg font-ui text-ui text-slate-900 placeholder:text-slate-500 input-focus-ring transition-shadow bg-surface-container-lowest" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-ui text-ui font-medium rounded-lg py-2.5 transition-colors flex items-center justify-center gap-2" type="submit">
                    Войти
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="mt-6 flex items-center">
<div class="flex-grow border-t border-slate-200"></div>
<span class="flex-shrink-0 mx-4 text-slate-500 font-label text-label uppercase">Или</span>
<div class="flex-grow border-t border-slate-200"></div>
</div>
<!-- Register Link -->
<div class="mt-6 text-center">
<p class="font-ui text-ui text-on-surface-variant">
                    Нет аккаунта? 
                    <a class="text-primary hover:text-primary-container font-medium transition-colors" href="#">Зарегистрироваться</a>
</p>
</div>
</div>
</main>
</body></html>
